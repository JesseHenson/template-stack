services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: template_stack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  inngest:
    image: inngest/inngest:latest
    command: inngest dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      INNGEST_DEV: 1
    networks:
      - default
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.template-stack-inngest.rule=Host(`inngest.template-stack.localhost`)"
      - "traefik.http.routers.template-stack-inngest.priority=100"
      - "traefik.http.routers.template-stack-inngest.entrypoints=web"
      - "traefik.http.services.template-stack-inngest.loadbalancer.server.port=8288"

  backend:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/template_stack
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      - postgres
      - redis
    networks:
      - default
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.template-stack-api.rule=Host(`api.template-stack.localhost`)"
      - "traefik.http.routers.template-stack-api.priority=100"
      - "traefik.http.routers.template-stack-api.entrypoints=web"
      - "traefik.http.services.template-stack-api.loadbalancer.server.port=8000"

  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY:-}
      - VITE_API_URL=http://api.template-stack.localhost
    depends_on:
      - backend
    networks:
      - default
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.template-stack-frontend.rule=Host(`template-stack.localhost`)"
      - "traefik.http.routers.template-stack-frontend.priority=100"
      - "traefik.http.routers.template-stack-frontend.entrypoints=web"
      - "traefik.http.services.template-stack-frontend.loadbalancer.server.port=5173"

volumes:
  pgdata:
  frontend_node_modules:

networks:
  traefik-proxy:
    external: true
